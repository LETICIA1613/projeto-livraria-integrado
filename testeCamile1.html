<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Livros a Caminho - Meus Pedidos</title>
    <style>
        :root {
            --vermelho-escuro: #8C031C;
            --rosa-medio: #BF6980;
            --cinza-claro: #F0F0F2;
            --verde-escuro: #3A4011;
            --branco: #ffffff;
            --marrom: #5C4033;
            --bege: #F5E6D3;
            --dourado: #D4AF37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        body {
            background: linear-gradient(135deg, var(--vermelho-escuro), var(--rosa-medio));
            padding: 20px;
            min-height: 100vh;
            color: var(--branco);
            position: relative;
        }

        /* Elementos decorativos de livraria */
        body::before {
            content: "📚";
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 80px;
            opacity: 0.1;
            pointer-events: none;
        }

        body::after {
            content: "📖";
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 60px;
            opacity: 0.1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .voltar {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--branco);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-family: Georgia, serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .voltar:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-3px);
        }

        .titulo-pagina {
            font-size: 24px;
            color: var(--branco);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-geral {
            background: var(--verde-escuro);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Perfil */
        .perfil {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .foto {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cinza-claro), var(--branco));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .foto:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139,3,28,0.4);
        }

        .foto::after {
            content: "✏️";
            position: absolute;
            bottom: -3px;
            right: -3px;
            background: var(--verde-escuro);
            color: var(--branco);
            font-size: 12px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(58,64,17,0.5);
            cursor: pointer;
        }

        .perfil h2 {
            color: var(--branco);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: 28px;
        }

        .perfil p {
            font-style: italic;
            opacity: 0.9;
        }

        /* Cards de pedidos */
        .pedidos-container {
            margin-top: 20px;
        }

        .pedido-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .pedido-card::before {
            content: "✨";
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 30px;
            opacity: 0.2;
            pointer-events: none;
        }

        .pedido-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .loja-nome {
            font-size: 20px;
            font-weight: bold;
            color: var(--branco);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loja-nome .icone-loja {
            font-size: 28px;
        }

        .status-pedido {
            background: var(--verde-escuro);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .entrega-info {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-label {
            font-weight: bold;
            opacity: 0.9;
        }

        .info-value {
            color: var(--cinza-claro);
        }

        /* Barra de progresso estilo livro */
        .progresso-area {
            margin: 20px 0;
        }

        .progresso-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .progresso-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progresso-fill {
            background: linear-gradient(90deg, var(--verde-escuro), var(--dourado));
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .progresso-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .etapas {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .etapa {
            text-align: center;
            flex: 1;
            font-size: 12px;
            opacity: 0.5;
            position: relative;
        }

        .etapa.ativa {
            opacity: 1;
        }

        .etapa .etapa-icone {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
        }

        /* Mapa temático de livraria */
        .mapa-simulado {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            position: relative;
            min-height: 150px;
            border: 1px dashed var(--dourado);
        }

        .mapa-simulado::before {
            content: "🗺️";
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 20px;
            opacity: 0.5;
        }

        .caminho-literario {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }

        .ponto-parada {
            text-align: center;
            flex: 1;
            position: relative;
        }

        .ponto-icone {
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
        }

        .ponto-nome {
            font-size: 10px;
        }

        .linha-conexao {
            flex: 2;
            height: 2px;
            background: linear-gradient(90deg, var(--dourado), var(--verde-escuro));
            position: relative;
        }

        /* Seção da transportadora */
        .transportadora-info {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid var(--dourado);
        }

        .codigo-rastreio {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .codigo-texto {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--dourado);
        }

        .botao-copiar {
            background: var(--verde-escuro);
            border: none;
            color: var(--branco);
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .botao-copiar:hover {
            background: #4d5517;
            transform: scale(1.05);
        }

        .link-rastreio {
            display: inline-block;
            margin-top: 10px;
            color: var(--dourado);
            text-decoration: none;
            font-size: 13px;
        }

        .link-rastreio:hover {
            text-decoration: underline;
        }

        .botao-rastrear {
            background: linear-gradient(135deg, var(--verde-escuro), #4d5517);
            border: none;
            color: var(--branco);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-family: Georgia, serif;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            margin-top: 15px;
        }

        .botao-rastrear:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Itens do pedido - estilo livros */
        .itens-pedido {
            margin: 15px 0;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .item-pedido {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            padding: 5px;
            transition: 0.3s;
        }

        .item-pedido:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            transform: translateX(5px);
        }

        /* Banner promocional */
        .banner-livro {
            background: linear-gradient(135deg, var(--marrom), var(--bege));
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            color: var(--marrom);
        }

        .banner-texto {
            font-weight: bold;
        }

        .banner-cupom {
            background: var(--dourado);
            padding: 5px 15px;
            border-radius: 20px;
            font-family: monospace;
            font-weight: bold;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .perfil h2 {
                font-size: 22px;
            }
            
            .loja-nome {
                font-size: 18px;
            }
            
            .etapas {
                font-size: 10px;
            }

            .ponto-icone {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }

            .codigo-texto {
                font-size: 14px;
            }
        }

        @keyframes folhaVirando {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Banner temático -->
        <div class="banner-livro">
            <div class="banner-texto">
                📚 Leitura a caminho! Ganhe frete grátis na próxima compra
            </div>
            <div class="banner-cupom">
                LIVRO10
            </div>
        </div>

        <!-- Topo da página -->
        <div class="topo">
            <button class="voltar" onclick="history.back()">
                <span>←</span> Voltar à livraria
            </button>
            <div class="titulo-pagina">
                <span>📚</span> Livros a Caminho
            </div>
            <div class="status-geral">
                3 pedidos ativos
            </div>
        </div>

        <!-- Perfil do usuário -->
        <div class="perfil">
            <div class="foto">📖</div>
            <div>
                <h2>Olá, Leitor(a) Maria!</h2>
                <p>"O prazer da leitura está a caminho"</p>
            </div>
        </div>

        <!-- Lista de pedidos a caminho -->
        <div class="pedidos-container" id="pedidosContainer"></div>
    </div>

    <script>
        // Dados dos pedidos - Tema livraria com transportadoras
        const pedidos = [
            {
                id: 1,
                loja: "Livraria Cultura",
                iconeLoja: "🏛️",
                status: "em_rota",
                progresso: 65,
                transportadora: "Loggi",
                codigoRastreio: "LG123456789BR",
                linkRastreio: "https://www.loggi.com/rastrear/",
                tempoEstimado: "15-20 min",
                distancia: "2.3 km",
                enderecoEntrega: "Rua das Letras, 123 - Apt 42",
                itens: [
                    { nome: "📖 O Alquimista - Paulo Coelho", quantidade: 1, preco: "R$ 49,90" },
                    { nome: "📕 Dom Casmurro - Machado de Assis", quantidade: 1, preco: "R$ 39,90" },
                    { nome: "🎁 Marcador de Páginas Personalizado", quantidade: 1, preco: "R$ 5,00" }
                ],
                ultimaAtualizacao: "Saiu para entrega há 5 minutos",
                localizacao: "Próximo à Biblioteca Municipal"
            },
            {
                id: 2,
                loja: "Saraiva Livreiros",
                iconeLoja: "📚",
                status: "preparando",
                progresso: 30,
                transportadora: "JadLog",
                codigoRastreio: "JL987654321BR",
                linkRastreio: "https://www.jadlog.com.br/rastreamento",
                tempoEstimado: "30-40 min",
                distancia: "1.8 km",
                enderecoEntrega: "Rua das Letras, 123 - Apt 42",
                itens: [
                    { nome: "📘 A Culpa é das Estrelas - John Green", quantidade: 1, preco: "R$ 44,90" },
                    { nome: "📙 Harry Potter e a Pedra Filosofal", quantidade: 1, preco: "R$ 59,90" },
                    { nome: "📗 O Pequeno Príncipe", quantidade: 1, preco: "R$ 29,90" }
                ],
                ultimaAtualizacao: "Separando livros no estoque",
                localizacao: "Centro de distribuição"
            },
            {
                id: 3,
                loja: "Amazon Livros",
                iconeLoja: "📦",
                status: "em_rota",
                progresso: 85,
                transportadora: "Transportadora Brasileira",
                codigoRastreio: "TBR456123789BR",
                linkRastreio: "https://www.transportadorabrasileira.com.br/rastreio",
                tempoEstimado: "5-10 min",
                distancia: "0.8 km",
                enderecoEntrega: "Rua das Letras, 123 - Apt 42",
                itens: [
                    { nome: "📕 1984 - George Orwell", quantidade: 1, preco: "R$ 34,90" },
                    { nome: "📔 Revolução dos Bichos - George Orwell", quantidade: 1, preco: "R$ 29,90" }
                ],
                ultimaAtualizacao: "Muito perto de você!",
                localizacao: "Virando na sua rua"
            }
        ];

        // Função para copiar código de rastreio
        function copiarCodigo(codigo) {
            navigator.clipboard.writeText(codigo).then(() => {
                mostrarNotificacao(`✅ Código ${codigo} copiado!`);
            }).catch(() => {
                mostrarNotificacao("❌ Erro ao copiar código");
            });
        }

        // Função para abrir link de rastreio
        function abrirRastreio(link, codigo) {
            window.open(link + codigo, '_blank');
        }

        // Função para renderizar os pedidos
        function renderizarPedidos() {
            const container = document.getElementById('pedidosContainer');
            container.innerHTML = '';

            pedidos.forEach(pedido => {
                const progressoWidth = pedido.progresso + '%';
                const statusTexto = pedido.status === 'em_rota' ? '📚 Livros a caminho' : '📖 Separando livros';
                const progressoLabel = pedido.status === 'em_rota' ? 'Jornada literária' : 'Preparando pedido';

                // Definir etapas baseado no status
                let etapas = [];
                if (pedido.status === 'em_rota') {
                    etapas = [
                        { nome: 'Pedido confirmado', ativa: true, icone: '✅' },
                        { nome: 'Saiu para entrega', ativa: true, icone: '📚' },
                        { nome: 'Próximo de você', ativa: pedido.progresso > 70, icone: '📍' },
                        { nome: 'Entregue', ativa: false, icone: '🏠' }
                    ];
                } else {
                    etapas = [
                        { nome: 'Pedido confirmado', ativa: true, icone: '✅' },
                        { nome: 'Separando livros', ativa: true, icone: '📖' },
                        { nome: 'Saiu para entrega', ativa: false, icone: '🚚' },
                        { nome: 'Entregue', ativa: false, icone: '🏠' }
                    ];
                }

                const cardHTML = `
                    <div class="pedido-card">
                        <div class="pedido-header">
                            <div class="loja-nome">
                                <span class="icone-loja">${pedido.iconeLoja}</span>
                                ${pedido.loja}
                            </div>
                            <div class="status-pedido">
                                ${statusTexto}
                            </div>
                        </div>

                        <div class="entrega-info">
                            <div class="info-row">
                                <span class="info-label">📍 Endereço do leitor:</span>
                                <span class="info-value">${pedido.enderecoEntrega}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📏 Distância literária:</span>
                                <span class="info-value">${pedido.distancia}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">⏱️ Tempo estimado:</span>
                                <span class="info-value">${pedido.tempoEstimado}</span>
                            </div>
                        </div>

                        <div class="progresso-area">
                            <div class="progresso-label">
                                <span>${progressoLabel}</span>
                                <span>${pedido.progresso}%</span>
                            </div>
                            <div class="progresso-bar">
                                <div class="progresso-fill" style="width: ${progressoWidth}"></div>
                            </div>
                            <div class="etapas">
                                ${etapas.map(etapa => `
                                    <div class="etapa ${etapa.ativa ? 'ativa' : ''}">
                                        <span class="etapa-icone">${etapa.icone}</span>
                                        <span>${etapa.nome}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        ${pedido.status === 'em_rota' ? `
                            <div class="mapa-simulado">
                                <div style="font-size: 14px; margin-bottom: 10px;">🗺️ Rota literária do pedido:</div>
                                <div class="caminho-literario">
                                    <div class="ponto-parada">
                                        <div class="ponto-icone">🏛️</div>
                                        <div class="ponto-nome">Livraria</div>
                                    </div>
                                    <div class="linha-conexao"></div>
                                    <div class="ponto-parada">
                                        <div class="ponto-icone" style="background: var(--verde-escuro);">${pedido.progresso > 50 ? '📚' : '🚚'}</div>
                                        <div class="ponto-nome">${pedido.localizacao}</div>
                                    </div>
                                    <div class="linha-conexao"></div>
                                    <div class="ponto-parada">
                                        <div class="ponto-icone">🏠</div>
                                        <div class="ponto-nome">Seu lar</div>
                                    </div>
                                </div>
                                <div style="font-size: 12px; margin-top: 10px;">🕐 ${pedido.ultimaAtualizacao}</div>
                            </div>
                            
                            <!-- Seção da Transportadora -->
                            <div class="transportadora-info">
                                <div class="info-row">
                                    <span class="info-label">🚚 Transportadora:</span>
                                    <span class="info-value"><strong>${pedido.transportadora}</strong></span>
                                </div>
                                <div class="codigo-rastreio">
                                    <div>
                                        <span style="font-size: 12px;">📦 Código de rastreio:</span>
                                        <div class="codigo-texto">${pedido.codigoRastreio}</div>
                                    </div>
                                    <button class="botao-copiar" onclick="copiarCodigo('${pedido.codigoRastreio}')">
                                        📋 Copiar
                                    </button>
                                </div>
                                <a href="#" class="link-rastreio" onclick="abrirRastreio('${pedido.linkRastreio}', '${pedido.codigoRastreio}'); return false;">
                                    🔗 Rastrear no site da transportadora →
                                </a>
                            </div>
                        ` : `
                            <div class="entrega-info">
                                <div class="info-row">
                                    <span class="info-label">📦 Status:</span>
                                    <span class="info-value">${pedido.ultimaAtualizacao}</span>
                                </div>
                            </div>
                            <!-- Seção da Transportadora para pedidos em preparo -->
                            <div class="transportadora-info">
                                <div class="info-row">
                                    <span class="info-label">🚚 Transportadora:</span>
                                    <span class="info-value"><strong>${pedido.transportadora}</strong></span>
                                </div>
                                <div class="codigo-rastreio">
                                    <div>
                                        <span style="font-size: 12px;">📦 Código de rastreio:</span>
                                        <div class="codigo-texto">${pedido.codigoRastreio}</div>
                                    </div>
                                    <button class="botao-copiar" onclick="copiarCodigo('${pedido.codigoRastreio}')">
                                        📋 Copiar
                                    </button>
                                </div>
                                <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">
                                    ⏳ Rastreamento disponível assim que o pedido for enviado
                                </div>
                            </div>
                        `}

                        <div class="itens-pedido">
                            <strong>📚 Seus livros:</strong>
                            ${pedido.itens.map(item => `
                                <div class="item-pedido">
                                    <span>${item.nome}</span>
                                    <span>${item.preco}</span>
                                </div>
                            `).join('')}
                        </div>

                        <button class="botao-rastrear" onclick="atualizarRastreamento(${pedido.id})">
                            ${pedido.status === 'em_rota' ? '🔄 Atualizar jornada do livro' : '📖 Acompanhar pedido'}
                        </button>
                    </div>
                `;

                container.innerHTML += cardHTML;
            });
        }

        // Função para simular atualização de rastreamento
        function atualizarRastreamento(pedidoId) {
            const pedido = pedidos.find(p => p.id === pedidoId);
            if (pedido && pedido.status === 'em_rota') {
                // Simular avanço do progresso
                if (pedido.progresso < 95) {
                    pedido.progresso += Math.floor(Math.random() * 10) + 1;
                    if (pedido.progresso > 95) pedido.progresso = 95;
                    
                    // Atualizar localização simulada
                    const locais = [
                        "A 500m do seu endereço - passando pela livraria de esquina",
                        "Aproximando-se da sua rua - carregando histórias",
                        "Quase chegando! Prepare o marcador de páginas",
                        "Virando na sua esquina com os livros"
                    ];
                    pedido.localizacao = locais[Math.floor(Math.random() * locais.length)];
                    pedido.ultimaAtualizacao = `Atualizado agora - ${pedido.localizacao}`;
                    
                    renderizarPedidos();
                    
                    // Mostrar feedback
                    mostrarNotificacao(`📚 Jornada avançada! Progresso: ${pedido.progresso}%`);
                } else {
                    mostrarNotificacao("🎉 Seus livros estão muito perto! Prepare-se para a leitura!");
                }
            } else if (pedido && pedido.status === 'preparando') {
                // Simular mudança de status
                if (pedido.progresso < 60) {
                    pedido.progresso += 15;
                    pedido.ultimaAtualizacao = `Separando livros - ${pedido.progresso}% concluído`;
                    renderizarPedidos();
                    mostrarNotificacao(`📖 Pedido sendo separado! Progresso: ${pedido.progresso}%`);
                } else if (pedido.progresso >= 60 && pedido.progresso < 100) {
                    pedido.progresso = 100;
                    pedido.status = 'em_rota';
                    pedido.localizacao = "Saiu da livraria com seus livros";
                    pedido.ultimaAtualizacao = "Pedido saiu para entrega! Sua leitura está chegando!";
                    renderizarPedidos();
                    mostrarNotificacao("🎉 Boa notícia! Seus livros saíram para entrega!");
                }
            }
        }

        // Notificação simples
        function mostrarNotificacao(mensagem) {
            const notificacao = document.createElement('div');
            notificacao.textContent = mensagem;
            notificacao.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, var(--verde-escuro), #4d5517);
                color: white;
                padding: 12px 24px;
                border-radius: 10px;
                z-index: 1000;
                animation: fadeInUp 0.3s ease;
                font-family: Georgia, serif;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            `;
            
            document.body.appendChild(notificacao);
            
            setTimeout(() => {
                notificacao.style.animation = 'fadeOutDown 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notificacao);
                }, 300);
            }, 3000);
        }

        // Adicionar animações CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes fadeOutDown {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(20px);
                }
            }
        `;
        document.head.appendChild(style);

        // Inicializar página
        renderizarPedidos();

        // Atualização automática a cada 15 segundos
        let autoUpdateInterval = setInterval(() => {
            const pedidoEmRota = pedidos.find(p => p.status === 'em_rota');
            if (pedidoEmRota && pedidoEmRota.progresso < 100) {
                atualizarRastreamento(pedidoEmRota.id);
            }
        }, 15000);

        // Limpar intervalo quando a página for fechada
        window.addEventListener('beforeunload', () => {
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
            }
        });
    </script>
</body>
</html>
