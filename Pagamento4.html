<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — HamStore Books</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --vermelho-escuro: #8C031C;
            --rosa-medio: #BF6980;
            --cinza-claro: #F0F0F2;
            --dourado-principal: #D9B607;
            --dourado-escuro: #8C5C03;
            --branco: #ffffff;
            --sombra-suave: rgba(140, 3, 28, 0.1);
            --sombra-dourado: rgba(217, 182, 7, 0.3);
            --cotton-candy: #E38792;
            --garnet: #4E0A0B;
            --dusty-white: #F2EEE8;
            --khaki: #9DAD71;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--cinza-claro); min-height: 100vh; color: var(--garnet); }

        /* ── MENUS ── */
        .shopee-top { background-color: var(--cotton-candy); color: var(--dusty-white); font-size: 14px; position: sticky; top: 0; z-index: 1001; box-shadow: 0 2px 8px rgba(78,10,11,0.15); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; height: 40px; }
        .flex { display: flex; align-items: center; gap: 20px; }
        .navbar a { color: var(--dusty-white); text-decoration: none; font-size: 13px; }
        .navbar a:hover { opacity: 0.8; }
        .navbar_links { display: flex; align-items: center; list-style: none; gap: 16px; margin: 0; padding: 0; }
        .navbar__link-text { color: var(--dusty-white); font-size: 13px; }
        .navbar__link--signup { font-weight: 500; background-color: var(--garnet); padding: 4px 12px; border-radius: 15px; }
        .navbar__link-separator { width: 1px; height: 16px; background-color: rgba(242,238,232,0.4); margin: 0 4px; }
        .shopee-logo-area { display: flex; align-items: center; gap: 8px; }
        .shopee-store-name { font-weight: 700; font-size: 15px; color: var(--garnet); cursor: pointer; }
        .shopee-store-name small { font-size: 10px; font-weight: 400; color: var(--dusty-white); }
        .shopee-social-icons { display: flex; gap: 8px; align-items: center; }
        .social-icon { display: inline-block; width: 20px; height: 20px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .instagram { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23F2EEE8"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>'); }
        .whatsapp { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23F2EEE8"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.556 4.118 1.523 5.847L.057 23.882l6.204-1.448A11.934 11.934 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.782 9.782 0 01-5.004-1.373l-.36-.214-3.713.868.922-3.596-.234-.37A9.789 9.789 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>'); }
        .tiktok { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23F2EEE8"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.87-4.53v-3.47a6.33 6.33 0 0 0-5.34 6.2 6.33 6.33 0 0 0 10.92 4.3 6.34 6.34 0 0 0 1.77-4.3V8.92a8.26 8.26 0 0 0 4.79 1.52V6.95a4.82 4.82 0 0 1-3.77-2.26z"/></svg>'); }
        .header { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); padding: 14px 30px; box-shadow: 0 4px 20px var(--sombra-suave); position: sticky; top: 40px; z-index: 100; border-radius: 0 0 20px 20px; }
        .logo { font-size: 26px; font-weight: bold; color: var(--garnet); cursor: pointer; letter-spacing: 1px; }
        .search-bar { flex: 1; margin: 0 30px; max-width: 480px; }
        .search-bar input { width: 100%; padding: 13px 22px; border-radius: 30px; border: 2px solid var(--dusty-white); font-size: 15px; background: var(--dusty-white); outline: none; }
        .icons { display: flex; gap: 16px; }
        .btn-sem-borda { background: none; border: none; color: var(--garnet); font-size: 22px; cursor: pointer; transition: all 0.3s; padding: 6px; border-radius: 10px; }
        .btn-sem-borda:hover { color: var(--cotton-candy); transform: translateY(-2px); }

        /* ── PROGRESSO ── */
        .progresso-wrap { background: var(--branco); border-bottom: 2px solid var(--cinza-claro); padding: 0 32px; box-shadow: 0 2px 8px var(--sombra-suave); }
        .progresso-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; height: 60px; }
        .etapa { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .etapa-linha { flex: 1; height: 3px; border-radius: 2px; margin: 0 10px; }
        .etapa-linha.ativa { background: linear-gradient(90deg, var(--dourado-principal), var(--dourado-escuro)); }
        .etapa-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; background: linear-gradient(135deg, var(--dourado-principal), var(--dourado-escuro)); color: var(--branco); border: 2px solid var(--dourado-escuro); }
        .etapa-label { font-size: 13px; font-weight: 700; color: var(--dourado-escuro); white-space: nowrap; }

        /* ── LAYOUT ── */
        .layout { max-width: 700px; margin: 36px auto 60px; padding: 0 20px; }

        /* ── HERO ── */
        .hero {
            border-radius: 24px;
            padding: 44px 32px 36px;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .hero.ok { background: linear-gradient(135deg, #1b5e20, #2e7d32, #43a047); box-shadow: 0 10px 40px rgba(27,94,32,0.4); }
        .hero.pend { background: linear-gradient(135deg, var(--vermelho-escuro), var(--rosa-medio)); box-shadow: 0 10px 40px var(--sombra-suave); }
        .hero::before { content:''; position:absolute; top:-80px; right:-80px; width:240px; height:240px; border-radius:50%; background:rgba(255,255,255,0.06); }
        .hero::after  { content:''; position:absolute; bottom:-80px; left:-40px; width:260px; height:260px; border-radius:50%; background:rgba(255,255,255,0.04); }
        .hero-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
        .hero h1 { font-size: 28px; font-weight: 900; color: var(--branco); margin-bottom: 10px; }
        .hero p { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.7; max-width: 400px; margin: 0 auto; }
        .num-pedido { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 30px; padding: 8px 20px; font-size: 13px; font-weight: 700; color: var(--branco); margin-top: 16px; letter-spacing: 1px; }

        /* ── ALERTA BOLETO ── */
        .alerta-boleto { background: rgba(217,182,7,0.1); border: 2px solid rgba(217,182,7,0.3); border-radius: 16px; padding: 16px 20px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 20px; }
        .alerta-boleto i { color: var(--dourado-escuro); font-size: 18px; margin-top: 2px; flex-shrink: 0; }
        .alerta-boleto div { font-size: 13px; color: var(--dourado-escuro); line-height: 1.7; }

        /* ── CARD BASE ── */
        .card { background: var(--branco); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px var(--sombra-suave); margin-bottom: 20px; }
        .card-header { padding: 18px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid var(--cinza-claro); background: linear-gradient(135deg, #fefefe, var(--cinza-claro)); }
        .card-header h3 { font-size: 15px; font-weight: 700; color: var(--vermelho-escuro); flex: 1; }
        .icon-badge { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--dourado-principal), var(--dourado-escuro)); display: flex; align-items: center; justify-content: center; color: var(--branco); font-size: 15px; flex-shrink: 0; }
        .card-body { padding: 22px 24px; }

        /* ── TIMELINE ── */
        .tl { padding-left: 40px; position: relative; }
        .tl::before { content:''; position:absolute; left:14px; top:10px; bottom:10px; width:2px; background:var(--cinza-claro); border-radius:2px; }
        .tl-item { position:relative; padding-bottom:22px; }
        .tl-item:last-child { padding-bottom:0; }
        .tl-dot { position:absolute; left:-34px; top:2px; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; z-index:1; }
        .tl-dot.ok   { background:linear-gradient(135deg,#1b8a50,#145c35); color:var(--branco); }
        .tl-dot.curr { background:linear-gradient(135deg,var(--dourado-principal),var(--dourado-escuro)); color:var(--branco); animation:pulse 1.5s infinite; }
        .tl-dot.pend { background:var(--cinza-claro); color:#bbb; border:2px solid #ddd; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(217,182,7,0.5)} 50%{box-shadow:0 0 0 7px rgba(217,182,7,0)} }
        .tl-title { font-weight: 700; font-size: 14px; color: var(--garnet); }
        .tl-title.pend { color: #bbb; }
        .tl-desc { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.5; }
        .tl-hora { font-size: 11px; color: #ccc; margin-top: 3px; }

        /* ── ITENS MINI ── */
        .item-mini { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--cinza-claro); align-items:center; }
        .item-mini:last-child { border-bottom:none; }
        .item-img { width:44px; height:56px; background:linear-gradient(135deg,var(--cinza-claro),#e4e4e6); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--rosa-medio); flex-shrink:0; }
        .item-dados { flex:1; }
        .item-nome { font-size:13px; font-weight:700; color:var(--garnet); }
        .item-meta { font-size:12px; color:#888; margin-top:2px; }
        .item-preco { font-weight:800; font-size:14px; color:var(--vermelho-escuro); }

        /* ── FINANCEIRO ── */
        .fin-linha { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--cinza-claro); font-size:14px; }
        .fin-linha:last-of-type { border-bottom:none; }
        .fl { color:#777; }
        .fv { font-weight:700; color:var(--garnet); }
        .fv.verde { color:#27ae60; }
        .fin-total { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:14px; border-top:2px solid var(--cinza-claro); }
        .fin-total .fl { font-weight:800; font-size:15px; color:var(--garnet); }
        .fin-total .fv { font-size:26px; font-weight:900; color:var(--vermelho-escuro); }
        .email-conf { display:flex; align-items:center; gap:12px; background:rgba(33,150,243,0.07); border:1px solid rgba(33,150,243,0.2); border-radius:12px; padding:12px 16px; font-size:13px; color:#1565c0; margin-top:14px; }
        .email-conf i { font-size:18px; flex-shrink:0; }

        /* ── AÇÕES ── */
        .acoes { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .btn-ac { padding:14px; border-radius:14px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; border:2px solid transparent; }
        .btn-ac.prim { background:linear-gradient(135deg,var(--dourado-principal),var(--dourado-escuro)); color:var(--branco); box-shadow:0 4px 14px var(--sombra-dourado); }
        .btn-ac.prim:hover { transform:translateY(-2px); box-shadow:0 8px 24px var(--sombra-dourado); }
        .btn-ac.sec  { background:var(--branco); border-color:var(--rosa-medio); color:var(--vermelho-escuro); }
        .btn-ac.sec:hover  { background:var(--cinza-claro); }
        .btn-ac.full { grid-column:1/-1; background:var(--cinza-claro); border-color:var(--cinza-claro); color:var(--garnet); }
        .btn-ac.full:hover { background:linear-gradient(135deg,var(--vermelho-escuro),var(--rosa-medio)); color:var(--branco); border-color:var(--vermelho-escuro); }

        @media (max-width:600px) { .acoes{grid-template-columns:1fr} .hero h1{font-size:22px} .etapa-label{display:none} }
    </style>
</head>
<body>

<!-- BARRA SUPERIOR -->
<header class="shopee-top">
    <div class="container">
        <nav class="navbar">
            <div class="flex">
                <div class="shopee-logo-area">
                    <span style="font-size:18px;">📚</span>
                    <span class="shopee-store-name" onclick="window.location.href='Entrar.html'">HAMSTORE <small>books</small></span>
                </div>
                <a href="#" onclick="window.location.href='dashbord.html'">Central do Vendedor</a>

            <div class="flex">
                <div class="shopee-social-icons">
                    <span style="font-size:13px;color:var(--dusty-white);">Siga-nos</span>
                    <a href="#" class="social-icon instagram"></a>
                    <a href="#" class="social-icon whatsapp"></a>
                    <a href="#" class="social-icon tiktok"></a>
                </div>
            </div>
            <ul class="navbar_links">
                <li><a href="#" class="navbar__link-text">Ajuda</a></li>
                <li><a href="#" class="navbar__link-text navbar__link--signup">Cadastrar</a></li>
                <li><div class="navbar__link-separator"></div></li>
                <li><a href="#" class="navbar__link-text">Entrar</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- HEADER -->
<header class="header">
    <h1 onclick="window.location.href='Entrar.html'" class="logo">📚 Livraria</h1>
    <div class="search-bar"><input type="text" placeholder="Buscar livros..."></div>
    <div class="icons">
        <button class="btn-sem-borda" onclick="window.location.href='Carrinho.html'">🛒</button>
        <button class="btn-sem-borda">⚙️</button>
        <button class="btn-sem-borda" onclick="window.location.href='MinhasCompras.html'">👤</button>

</header>

<!-- PROGRESSO — TUDO FEITO -->
<div class="progresso-wrap">
    <div class="progresso-inner">
        <div class="etapa">
            <div class="etapa-num"><i class="fas fa-check" style="font-size:11px;"></i></div>
            <span class="etapa-label">Carrinho</span>
        </div>
        <div class="etapa-linha ativa"></div>
        <div class="etapa">
            <div class="etapa-num"><i class="fas fa-check" style="font-size:11px;"></i></div>
            <span class="etapa-label">Pagamento</span>
        </div>
        <div class="etapa-linha ativa"></div>
        <div class="etapa">
            <div class="etapa-num"><i class="fas fa-check" style="font-size:11px;"></i></div>
            <span class="etapa-label">Confirmação</span>
        </div>
    </div>
</div>

<div class="layout" id="pg"></div>

<script>
    const p = new URLSearchParams(location.search);
    const metodo   = p.get('metodo') || 'pix';
    const totalNum = parseFloat(p.get('total') || 129.90);
    const totalFmt = totalNum.toFixed(2).replace('.', ',');
    const isPix    = metodo === 'pix';

    const numPed = '#HMS' + Math.floor(Math.random()*90000+10000);
    const agora  = new Date().toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'});

    function prevEntrega() {
        const d = new Date(); d.setDate(d.getDate()+(isPix?5:8));
        return d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    }

    function venc() {
        const d = new Date(); d.setDate(d.getDate()+3);
        return d.toLocaleDateString('pt-BR');
    }

    document.getElementById('pg').innerHTML = `

    <!-- HERO -->
    <div class="hero ${isPix?'ok':'pend'}">
        <div class="hero-icon">${isPix?'🎉':'⏳'}</div>
        <h1>${isPix?'Pedido confirmado!':'Boleto gerado!'}</h1>
        <p>${isPix
            ? 'Seu pagamento via Pix foi aprovado e seu pedido já está sendo preparado com carinho.'
            : 'Pague o boleto até <strong style="color:rgba(255,255,255,0.95);">'+venc()+'</strong> para confirmar e processar seu pedido.'
        }</p>
        <div class="num-pedido"><i class="fas fa-receipt"></i> ${numPed}</div>
    </div>

    <!-- ALERTA BOLETO -->
    ${!isPix?`
    <div class="alerta-boleto">
        <i class="fas fa-exclamation-triangle"></i>
        <div>Seu pedido será processado somente após a <strong>confirmação do pagamento</strong> pelo banco, em até 1 dia útil.</div>
    </div>`:''}

    <!-- TIMELINE -->
    <div class="card">
        <div class="card-header">
            <div class="icon-badge"><i class="fas fa-route"></i></div>
            <h3>Acompanhamento</h3>
        </div>
        <div class="card-body">
            <div class="tl">
                <div class="tl-item">
                    <div class="tl-dot ok"><i class="fas fa-check"></i></div>
                    <div class="tl-title">Pedido recebido</div>
                    <div class="tl-desc">Recebemos seu pedido com sucesso.</div>
                    <div class="tl-hora">${agora}</div>
                </div>
                <div class="tl-item">
                    <div class="tl-dot ${isPix?'ok':'curr'}">${isPix?'<i class="fas fa-check"></i>':'<i class="fas fa-clock"></i>'}</div>
                    <div class="tl-title">Pagamento ${isPix?'aprovado':'aguardando'}</div>
                    <div class="tl-desc">${isPix?`Pix confirmado às ${agora}`:`Aguardando pagamento do boleto até ${venc()}.`}</div>
                    ${isPix?`<div class="tl-hora">${agora}</div>`:''}
                </div>
                <div class="tl-item">
                    <div class="tl-dot ${isPix?'curr':'pend'}">${isPix?'<i class="fas fa-box-open"></i>':'<i class="fas fa-box"></i>'}</div>
                    <div class="tl-title ${isPix?'':'pend'}">Preparando envio</div>
                    <div class="tl-desc">${isPix?'Seu pedido está sendo embalado.':'Será iniciado após confirmação do pagamento.'}</div>
                </div>
                <div class="tl-item">
                    <div class="tl-dot pend"><i class="fas fa-truck"></i></div>
                    <div class="tl-title pend">Enviado</div>
                    <div class="tl-desc">Previsão: ${prevEntrega()}</div>
                </div>
                <div class="tl-item">
                    <div class="tl-dot pend"><i class="fas fa-home"></i></div>
                    <div class="tl-title pend">Entregue</div>
                    <div class="tl-desc">Vila Mariana · São Paulo – SP</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ITENS -->
    <div class="card">
        <div class="card-header">
            <div class="icon-badge"><i class="fas fa-shopping-bag"></i></div>
            <h3>Itens do pedido</h3>
        </div>
