<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login do Vendedor</title>

<link rel="stylesheet" href="loginVendedor.css">

</head>

<body>

<header class="topo">
<h2>Login do Vendedor</h2>
</header>

<main class="container">

<form class="formulario">

<fieldset>

<legend>Entrar</legend>

<div class="campo">

<label for="email">Email ou CNPJ</label>

<input 
type="text"
id="email"
name="email"
placeholder="Digite seu email ou CNPJ"
required>

</div >


<div class="campo">

<label for="senha">Senha</label>

<input
type="password"
id="senha"
name="senha"
placeholder="Digite sua senha"
required>

</div>


<div class="campo">

<label for="confirmarSenha">Confirmar Senha</label>

<input
type="password"
id="confirmarSenha"
name="confirmarSenha"
placeholder="Confirme sua senha"
required>

</div>


<button 
type="button"
onclick="window.location.href='CadastroVendedor.html'">

Entrar

</button>

<button 
type="button"
onclick="window.location.href='CadastroVendedor.html'">

Cadastre-se

</button>

</fieldset>

</form>

</main>

</body>
</html>
